# Optional local Postgres for development when you do not use Neon/Vercel yet.
# Start: docker compose up -d
# Stop:  docker compose down
# Then set DATABASE_URL in .env.local (see .env.example).

services:
  postgres:
    image: postgres:16-alpine
    container_name: align-app-postgres
    restart: unless-stopped
    ports:
      - "54332:5432"
    environment:
      POSTGRES_USER: align
      POSTGRES_PASSWORD: align
      POSTGRES_DB: align
